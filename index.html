<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roleta de Pessoas</title>
<style>
body{font-family:Arial,sans-serif;background:#111827;color:#fff;text-align:center;margin:0;padding:20px}
#wheelWrap{position:relative;width:380px;height:380px;margin:auto}
#wheel{width:100%;height:100%;border-radius:50%;border:8px solid #fff;transition:transform 5s cubic-bezier(.17,.67,.12,.99)}
#pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-top:40px solid #ef4444}
#preview img{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid #fff}
button{padding:14px 28px;border:none;border-radius:30px;font-weight:bold;cursor:pointer}
#spinBtn{background:#f59e0b;color:#fff}
#claimBtn{background:#22c55e;color:#fff;display:none;margin-top:10px}
</style>
</head>
<body>
<h1>🎯 Sorteio de Pessoas</h1>

<div id="wheelWrap">
<div id="pointer"></div>
<svg id="wheel" viewBox="0 0 400 400"><g id="segments"></g></svg>
</div>

<div id="preview">
<img id="currentImage" src="">
<h2 id="currentName">Aguardando sorteio...</h2>
</div>

<button id="spinBtn">GIRAR ROLETA</button><br><br>
<button id="claimBtn">🎉 Receber Prêmio</button>

<script>
const CLAIM_URL="https://SEU-SITE-DE-VALIDACAO.COM";

const people=[
{name:"João Silva",image:"https://www.petphotos.com.br/"},
{name:"Maria Souza",image:"https://forbes.com.br/forbes-tech/2021/06/11-aplicativos-pet-para-facilitar-a-vida-de-quem-tem-animais-de-estimacao/"},
{name:"Pedro Santos",image:"https://oglobo.globo.com/economia/caes-gatos-viram-negocio-bilionario-em-expansao-1-24266660"},
{name:"Ana Costa",image:"https://br.freepik.com/fotos-vetores-gratis/pet"}
];

const colors=["#ef4444","#3b82f6","#22c55e","#a855f7","#f59e0b","#64748b"];

const wheel=document.getElementById("wheel");
const svg=document.getElementById("segments");
const img=document.getElementById("currentImage");
const nameEl=document.getElementById("currentName");
const claimBtn=document.getElementById("claimBtn");
let winner=null;

function polar(cx,cy,r,a){
 return {x:cx+r*Math.cos((a-90)*Math.PI/180),y:cy+r*Math.sin((a-90)*Math.PI/180)};
}

(function(){
 const cx=200,cy=200,r=190,ang=360/people.length;
 people.forEach((p,i)=>{
  const s=i*ang,e=s+ang,p1=polar(cx,cy,r,s),p2=polar(cx,cy,r,e);
  const path=document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",`M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 0 1 ${p2.x} ${p2.y} Z`);
  path.setAttribute("fill",colors[i%colors.length]);
  svg.appendChild(path);
 });
})();

img.src=people[0].image;
nameEl.textContent=people[0].name;

document.getElementById("spinBtn").onclick=()=>{
 let i=0;
 const timer=setInterval(()=>{
   img.src=people[i].image;
   nameEl.textContent=people[i].name;
   i=(i+1)%people.length;
 },120);

 const winnerIndex=Math.floor(Math.random()*people.length);
 const seg=360/people.length;
 const rot=3600+(360-(winnerIndex*seg)-seg/2);

 wheel.style.transform=`rotate(${rot}deg)`;

 setTimeout(()=>{
   clearInterval(timer);
   winner=people[winnerIndex];
   img.src=winner.image;
   nameEl.innerHTML="🏆 "+winner.name;
   claimBtn.style.display="inline-block";
 },5000);
};

claimBtn.onclick=()=>{
 if(!winner)return;
 location.href=CLAIM_URL+"?nome="+encodeURIComponent(winner.name);
};
</script>
</body>
</html>
